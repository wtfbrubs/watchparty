# Template — não commitar com valor real.
# Criado pelo workflow arc-setup.yml via ARC_GITHUB_TOKEN secret do GitHub.
# PAT necessário: escopo "repo" (repositório privado).
apiVersion: v1
kind: Secret
metadata:
  name: arc-github-token
  namespace: arc-runners
type: Opaque
stringData:
  github_token: "REPLACE_WITH_GITHUB_PAT"
